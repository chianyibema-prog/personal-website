<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="calc.css">
</head>
<body>
    <script>
        function calc(){
            mycalc.screen.value = eval(mycalc.screen.value )
        }
        function deletelast(){
let display= document.mycalc.screen;
            display.value = display.value.slice(0,-1);
        }
        function cleardisplay(){
            document.mycalc.screen.value="";
        
        }
    </script>

    <form name="mycalc">
    <div class="div1">

<input type="text" class="div2"name="screen">
  <input  type="button"  class="button1" value="CLR"  onclick="cleardisplay()">
 <input type="button"  value="DEL"    class="button1"  onclick="deletelast()">
 <input type="button"  value="%"  class="button1"  onclick="mycalc.screen.value+= '%'">
 <input type="button"  value="/" class="button1" onclick="mycalc.screen.value+= '/'"><br>
 <input type="button"  value="7" class="button2" onclick="mycalc.screen.value+= '7'">
 <input type="button"  value="8" class="button2" onclick="mycalc.screen.value+= '8'">
 <input type="button"  value="9" class="button2" onclick="mycalc.screen.value+= '9'">
 <input type="button"  value="*"class="button2" onclick="mycalc.screen.value+= '*'"><br>
 <input type="button"  value="4" class="button3" onclick="mycalc.screen.value+= '4'">
 <input type="button"  value="5" class="button3" onclick="mycalc.screen.value+= '5'">
 <input type="button"  value="6" class="button3" onclick="mycalc.screen.value+= '6'">
 <input type="button"  value="-" class="button3" onclick="mycalc.screen.value+= '-'">
 <input type="button"  value="1" class="button4" onclick="mycalc.screen.value+= '1'">
 <input type="button"  value="2" class=" button4" onclick="mycalc.screen.value+= '2'">
 <input type="button"  value="3"class=" button4" onclick="mycalc.screen.value+= '3'">
 <input type="button"  value="+" class=" button4" onclick="mycalc.screen.value+= '+'"><br>
 <input type="button"  value="."class=" button4" onclick="mycalc.screen.value+= '.'">
 <input type="button"  value="0" class=" button4" onclick="mycalc.screen.value+= '0'">
 <input type="button"  value="=" class="button4" style="width: 35%; height: 10%; border-radius: 35px; background-color: rgb(199, 142, 177);"  onclick="calc()" >

</form>
 
    </div>
</body>
</html>
